[env]
HOME_ASSISTANT_TOKEN = "{{exec(command='security find-generic-password -s env -a HOME_ASSISTANT_TOKEN -w', cache_key='HOME_ASSISTANT_TOKEN')}}"
GITHUB_ACCESS_TOKEN  = "{{exec(command='security find-generic-password -s env -a GITHUB_ACCESS_TOKEN -w',  cache_key='GITHUB_ACCESS_TOKEN')}}"
JIRA_API_TOKEN       = "{{exec(command='security find-generic-password -s env -a JIRA_API_TOKEN -w',       cache_key='JIRA_API_TOKEN')}}"
BACKSTAGE_TOKEN      = "{{exec(command='security find-generic-password -s env -a BACKSTAGE_TOKEN -w',     cache_key='BACKSTAGE_TOKEN')}}"
AGENTMEMORY_URL = "https://agentmemory-api.wibrow.dev"
AGENTMEMORY_SECRET = { age = "" }

[tools]
python = "3.14"
uv = "latest"
node = "24"
go = "latest"
opentofu = "latest"

[tasks."keys:top"]
description = "Show most-used keys (keyfreq). Args: number of keys, e.g. mise run keys:top 30"
run = "keyfreq top"

[tasks."keys:reset"]
description = "Reset keyfreq counts"
run = "keyfreq reset"

[settings]
experimental = true

