[env]
HOME_ASSISTANT_TOKEN = "{{exec(command='security find-generic-password -s env -a HOME_ASSISTANT_TOKEN -w', cache_key='HOME_ASSISTANT_TOKEN')}}"
GITHUB_ACCESS_TOKEN  = "{{exec(command='security find-generic-password -s env -a GITHUB_ACCESS_TOKEN -w',  cache_key='GITHUB_ACCESS_TOKEN')}}"
JIRA_API_TOKEN       = "{{exec(command='security find-generic-password -s env -a JIRA_API_TOKEN -w',       cache_key='JIRA_API_TOKEN')}}"
BACKSTAGE_TOKEN      = "{{exec(command='security find-generic-password -s env -a BACKSTAGE_TOKEN -w',     cache_key='BACKSTAGE_TOKEN')}}"
KANIDM_ADMIN_PASSWORD = { age = "" }
AGENTMEMORY_URL = "https://agentmemory-api.wibrow.dev"
MEMINI_URL = "https://memini-api.wibrow.dev"
MEMINI_API_KEY = { age = "" }
KANIDM_URL = "https://idm.wibrow.dev"
AGENTMEMORY_SECRET = { age = "" }

[tools]
python = "3.14"
uv = "latest"
node = "24"
go = "latest"
opentofu = "latest"
terraform = "1.15.8"
tflint = "latest"
bun = "1.3.14"
pre-commit = "latest"

[tasks."secret:set"]
description = "Age-encrypt a secret into the mise config (chezmoi source) and apply. Usage: mise run secret:set NAME (prompts hidden; also accepts value on stdin)"
usage = 'arg "<name>"'
raw = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
name="$usage_name"
if [ -t 0 ]; then
  printf "Enter value for '%s': " "$name" >&2
  stty -echo; IFS= read -r value || true; stty echo; echo >&2
else
  IFS= read -r value || true
fi
[ -n "$value" ] || { echo "error: empty value" >&2; exit 1; }
src="$(chezmoi source-path ~/.config/mise/config.toml)"
mise trust --quiet "$src" 2>/dev/null || true
mise set --age-encrypt --file "$src" "$name=$value"
chezmoi apply ~/.config/mise/config.toml
echo "Stored '$name' age-encrypted in mise config and applied" >&2
'''

[tasks."secret:rm"]
description = "Remove a secret from the mise config (chezmoi source) and apply. Usage: mise run secret:rm NAME"
usage = 'arg "<name>"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
src="$(chezmoi source-path ~/.config/mise/config.toml)"
mise unset --file "$src" "$usage_name"
chezmoi apply ~/.config/mise/config.toml
'''

[tasks."keys:top"]
description = "Show most-used keys (keyfreq). Args: number of keys, e.g. mise run keys:top 30"
run = "keyfreq top"

[tasks."keys:reset"]
description = "Reset keyfreq counts"
run = "keyfreq reset"

[settings]
experimental = true

