unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set -g extended-keys on

set -g prefix C-Space
unbind C-a
bind C-Space send-prefix
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r i run-shell "tmux neww ~/.local/bin/tmux-cht"

# sesh: session/directory picker
bind-key -r f display-popup -E -w 80% -h 70% "zsh $HOME/.local/bin/tmux-sesh window"
bind-key -r g display-popup -E "zsh $HOME/.local/bin/tmux-workspace claude"
bind-key -r d display-popup -E "zsh $HOME/.local/bin/tmux-workspace dev"
bind-key -r s display-popup -E -w 80% -h 70% "zsh $HOME/.local/bin/tmux-sesh connect"
bind-key -r S display-popup -E -w 85% -h 75% "zsh $HOME/.local/bin/tmux-scratch"
# Bare Esc detaches scratch popup; passes through elsewhere
bind-key -T root Escape if-shell -F '#{==:#{session_name},scratch}' detach 'send-keys Escape'
bind-key -r N display-popup -E -w 85% -h 80% "zsh $HOME/.local/bin/tmux-notes"
bind-key -r b display-popup -E -w 60% -h 60% "zsh $HOME/.local/bin/tmux-bins"
bind-key -r F display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name} #{pane_current_path}' | fzf --reverse | cut -d' ' -f1 | xargs tmux switch-client -t"


# Worktrunk (git worktrees)
bind-key -r t display-popup -E -w 80% -h 70% -d "#{pane_current_path}" "wt switch 2>&1 || (echo '\nPress enter to close.' && read)"
bind-key -r T command-prompt -p "new worktree branch:" "run-shell 'wt -C \"#{pane_current_path}\" switch --create %% --no-cd -x \"tmux new-window -n {{ branch | sanitize }} -c {{ worktree_path }}\"'"
bind-key X confirm-before -p "remove worktree and close tab? (y/n)" "run-shell 'wt -C \"#{pane_current_path}\" remove -y && tmux kill-window -t #{window_id}'"
# Worktree of *any* repo (pick repo first) + claude in a new window
bind-key -r W display-popup -E -w 80% -h 70% "zsh $HOME/.local/bin/tmux-worktree-claude"

# Full-span splits (open in current pane's directory)
bind-key | split-window -h -f -c "#{pane_current_path}"
bind-key _ split-window -v -f -c "#{pane_current_path}"

bind-key C split-window -h -c "#{pane_current_path}" "zsh -lc 'mise exec -- claude'"
bind-key V split-window -v -c "#{pane_current_path}" "zsh -lc 'mise exec -- claude'"

bind-key . run -b 'tmux rename-window "`basename \"#{pane_current_path}\"`"'

# Tmux settings
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position bottom
setw -g mode-keys vi

# Styling
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# TPM Plugins
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-sessionizer' # replaced by sesh
# set -g @plugin 'christoomey/vim-tmux-navigator' # Navigate seamlessly between tmux panes and vim splits
set -g @plugin 'wfxr/tmux-fzf-url'

# Pomodoro Plugin
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Pomodoro settings
set -g @pomodoro_on " 🍅"          # The formatted timer for pomodoro
set -g @pomodoro_complete " ✅"     # The formatted timer when pomodoro is finished
set -g @pomodoro_pause " ⏸️"        # The formatted timer when pomodoro is paused
set -g @pomodoro_prompt_break " ⏰ Break time!"
set -g @pomodoro_prompt_pomodoro " 🍅 Time to focus!"
set -g @pomodoro_interval_display "[%s/%s]"

# Timer settings
set -g @pomodoro_mins 25
set -g @pomodoro_break_mins 5
set -g @pomodoro_long_break_mins 15
set -g @pomodoro_repeat false


# fzf-url
set -g @fzf-url-bind 'x'
set -g @fzf-url-fzf-options '-w 50% -h 50% --multi -0 --no-preview --no-border'

# Catppuccin Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "pomodoro_plus date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

set-option -g status-interval 60
set-option -g status-left "#[fg=blue,bright]#(gcalcli agenda | head -2 | tail -1)#[default]"

# Must load AFTER catppuccin: continuum auto-saves by injecting a hook into
# status-right, which catppuccin rebuilds. If continuum loads first, catppuccin
# wipes the hook and sessions silently stop saving.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
