apiVersion: v1
kind: ConfigMap
metadata:
  name: stress-test-config
  namespace: default
data:
  cpu_workers: "2"
  memory_workers: "1"
  memory_bytes: "256M"
  timeout: "30s"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: stress-test
  namespace: default
  labels:
    app: stress-test
spec:
  parallelism: 1
  completions: 1
  template:
    metadata:
      labels:
        app: stress-test
    spec:
      containers:
      - name: stress
        image: progrium/stress
        args:
        - "--verbose"
        - "--cpu"
        - "2"
        - "--io"
        - "1"
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "256M"
        - "--timeout"
        - "30s"
        resources:
          limits:
            memory: "512Mi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 1

---
apiVersion: v1
kind: Pod
metadata:
  name: resource-monitor
  namespace: default
  labels:
    app: resource-monitor
spec:
  containers:
  - name: monitor
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
    - |
      while true; do
        echo "=== Resource Usage at $(date) ==="
        # This would typically use kubectl top or metrics API
        echo "Check with: kubectl top pods"
        sleep 10
      done
    resources:
      limits:
        memory: "64Mi"
        cpu: "100m"
      requests:
        memory: "32Mi"
        cpu: "50m"