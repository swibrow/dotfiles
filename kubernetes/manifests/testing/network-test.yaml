apiVersion: v1
kind: ConfigMap
metadata:
  name: network-test-script
  namespace: default
data:
  test.sh: |
    #!/bin/bash
    echo "=== Network Connectivity Test ==="
    echo

    # DNS Tests
    echo "1. DNS Resolution Tests:"
    echo "   - Testing Kubernetes DNS..."
    nslookup kubernetes.default
    echo "   - Testing external DNS..."
    nslookup google.com

    # Service connectivity
    echo
    echo "2. Kubernetes API Server:"
    curl -k https://kubernetes.default.svc.cluster.local/healthz

    # External connectivity
    echo
    echo "3. External Connectivity:"
    echo "   - HTTP Test:"
    curl -I http://httpbin.org/status/200
    echo "   - HTTPS Test:"
    curl -I https://httpbin.org/status/200

    # Network latency
    echo
    echo "4. Network Latency:"
    ping -c 5 8.8.8.8

    echo
    echo "=== Test Complete ==="

---
apiVersion: batch/v1
kind: Job
metadata:
  name: network-test
  namespace: default
spec:
  template:
    metadata:
      labels:
        app: network-test
    spec:
      containers:
      - name: test
        image: nicolaka/netshoot:latest
        command: ["/bin/bash"]
        args: ["/scripts/test.sh"]
        volumeMounts:
        - name: script
          mountPath: /scripts
      volumes:
      - name: script
        configMap:
          name: network-test-script
          defaultMode: 0755
      restartPolicy: Never
  backoffLimit: 1