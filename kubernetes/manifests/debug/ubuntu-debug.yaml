apiVersion: v1
kind: Pod
metadata:
  name: ubuntu-debug
  namespace: default
  labels:
    app: ubuntu-debug
    purpose: comprehensive-debugging
spec:
  containers:
  - name: ubuntu
    image: ubuntu:latest
    command: ["/bin/bash"]
    args:
    - -c
    - |
      apt-get update && \
      apt-get install -y \
        curl \
        wget \
        dnsutils \
        net-tools \
        tcpdump \
        traceroute \
        iputils-ping \
        netcat \
        telnet \
        nmap \
        htop \
        vim \
        jq \
        mysql-client \
        postgresql-client \
        redis-tools \
        && sleep infinity
    resources:
      limits:
        memory: "512Mi"
        cpu: "500m"
      requests:
        memory: "256Mi"
        cpu: "200m"
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - SYS_PTRACE
  restartPolicy: Always